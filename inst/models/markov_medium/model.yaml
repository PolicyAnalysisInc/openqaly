    source: ~
    sampling: ~
transitions:
  - from: initial
    to: initial
    formula: ifelse(week > 8, 0, C)
  - from: initial
    to: hsct
    formula: ifelse(week > 8, resp_l1_rescue * p_hsct, 0)
  - from: initial
    to: l1_maint
    formula: ifelse(week > 8, resp_l1_rescue * (1 - p_hsct), 0)
  - from: initial
    to: l2_rescue
    formula: ifelse(week > 8, C, 0)
  - from: initial
    to: dead
    formula: event_prob(init_mort, year_lag, year)
  - from: l1_maint
    to: l1_maint
    formula: C
  - from: l1_maint
    to: l2_rescue
    formula: event_prob(l1_relapse_weib, state_year_lag, state_year)
  - from: l1_maint
    to: dead
    formula: event_prob(l1_maint_mort, year_lag, year)
  - from: hsct
    to: post_hsct
    formula: C
  - from: hsct
    to: dead
    formula: p_death_hsct + event_prob(hsct_mort, year_lag, year)
  - from: l2_rescue
    to: l2_rescue
    formula: ifelse(state_week > 8, 0, C)
  - from: l2_rescue
    to: hsct
    formula: ifelse(state_week > 8, resp_l2_rescue * p_hsct, 0)
  - from: l2_rescue
    to: l2_maint
    formula: ifelse(state_week > 8, resp_l2_rescue * (1 - p_hsct), 0)
  - from: l2_rescue
    to: palliative
    formula: ifelse(state_week > 8, C, 0)
  - from: l2_rescue
    to: dead
    formula: event_prob(l2_rescue_mort, year_lag, year)
  - from: l2_maint
    to: l2_maint
    formula: C
  - from: l2_maint
    to: palliative
    formula: event_prob(l2_relapse_weib, state_year_lag, state_year)
  - from: l2_maint
    to: dead
    formula: event_prob(l2_maint_mort, year_lag, year)
  - from: post_hsct
    to: post_hsct
    formula: C
  - from: post_hsct
    to: dead
    formula: event_prob(post_hsct_mort, year_lag, year)
  - from: palliative
    to: palliative
    formula: C
  - from: palliative
    to: dead
    formula: event_prob(palliative_mort, year_lag, year)
  - from: dead
    to: dead
    formula: '1'
