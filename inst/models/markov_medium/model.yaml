format_version: '1.0'
model_type: markov
settings:
  timeframe: 5.0
  timeframe_unit: years
  cycle_length: 1.0
  cycle_length_unit: weeks
  discount_cost: 3.5
  discount_outcomes: 3.5
  half_cycle_method: life-table
  reduce_state_cycle: yes
  days_per_year: 365.0
  discount_timing: start
  discount_method: by_cycle
strategies:
  - name: checkimab
    display_name: Checkimab
    description: Checkimab
    abbreviation: ~
    enabled: 1.0
  - name: chemoplatin
    display_name: Chemoplatin
    description: Chemoplatin
    abbreviation: ~
    enabled: 1.0
  - name: lenrastim
    display_name: Lenrastim
    description: Lenrastim
    abbreviation: ~
    enabled: 1.0
groups:
  - name: hsct_eligible
    display_name: HSCT Eligible
    description: HSCT Eligible
    weight: '0.61'
    enabled: 1.0
  - name: hsct_ineligible
    display_name: HSCT Ineligible
    description: HSCT Ineligible
    weight: '0.39'
    enabled: 1.0
states:
  - name: initial
    display_name: Initial Treatment
    description: initial
    initial_probability: '1'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 1.0
    state_cycle_limit_unit: Cycles
  - name: l1_maint
    display_name: L1 Maintenance
    description: l1_maint
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: .inf
    state_cycle_limit_unit: Cycles
  - name: l2_rescue
    display_name: Line 2 Rescue
    description: l2_rescue
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 10.0
    state_cycle_limit_unit: Cycles
  - name: l2_maint
    display_name: Line 2 Maintenance
    description: l2_maint
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: .inf
    state_cycle_limit_unit: Cycles
  - name: hsct
    display_name: HSCT
    description: hsct
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 1.0
    state_cycle_limit_unit: Cycles
  - name: post_hsct
    display_name: Post-HSCT
    description: post_hsct
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 10.0
    state_cycle_limit_unit: Cycles
  - name: palliative
    display_name: Palliative
    description: palliative
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 1.0
    state_cycle_limit_unit: Cycles
  - name: dead
    display_name: Dead
    description: dead
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 1.0
    state_cycle_limit_unit: Cycles
