format_version: '1.0'
model_type: markov
settings:
  timeframe: 30.0
  timeframe_unit: years
  cycle_length: 1.0
  cycle_length_unit: months
  discount_cost: 3.5
  discount_outcomes: 3.5
  half_cycle_method: life-table
  reduce_state_cycle: yes
  days_per_year: 365.0
  discount_timing: start
  discount_method: by_cycle
strategies:
  - name: chemo
    display_name: Chemotherapy
    description: Chemotherapy
    abbreviation: ~
    enabled: 1.0
  - name: target
    display_name: Targeted Therapy
    description: Targeted Therapy
    abbreviation: ~
    enabled: 1.0
  - name: check
    display_name: Checkimab
    description: Checkimab
    abbreviation: ~
    enabled: 1.0
groups:
  - name: male_age_lt_35
    display_name: Men Age 0-34
    description: Men under age 35
    weight: '0.24'
    enabled: 1.0
  - name: male_age_ge_35
    display_name: Men Age 35+
    description: Men age 35 or older
    weight: '0.23'
    enabled: 1.0
  - name: female_age_lt_35
    display_name: Women Age 0-34
    description: Women under age 35
    weight: '0.26'
    enabled: 1.0
  - name: female_age_ge_35
    display_name: Women Age 35+
    description: Women age 35 or older
    weight: '0.27'
    enabled: 1.0
states:
  - name: relapse_free_on_tx
    display_name: Relapse-Free (On-Tx)
    description: Relapse-free and on treatment
    initial_probability: '1'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 101.0
    state_cycle_limit_unit: Months
  - name: relapse_free_off_tx
    display_name: Relapse-Free (Off-Tx)
    description: Relapse-free and off treatment
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 101.0
    state_cycle_limit_unit: Months
  - name: relapse
    display_name: Relapse
    description: Post-relapse
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 101.0
    state_cycle_limit_unit: Months
  - name: dead
    display_name: Dead
    description: Dead
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 101.0
    state_cycle_limit_unit: Months
variables:
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '26'
    strategy: ~
    group: male_age_lt_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '45'
    strategy: ~
    group: male_age_ge_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '27'
    strategy: ~
    group: female_age_lt_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '48'
    strategy: ~
    group: female_age_ge_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"male"'
    strategy: ~
    group: male_age_lt_35
    source: ~
    sampling: ~
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"male"'
    strategy: ~
    group: male_age_ge_35
    source: ~
    sampling: ~
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"female"'
    strategy: ~
    group: female_age_lt_35
    source: ~
    sampling: ~
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"female"'
    strategy: ~
    group: female_age_ge_35
    source: ~
    sampling: ~
  - name: age
    display_name: Current age
    description: Current age in cycle
    formula: start_age + year
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_mort_gp
    display_name: GP Mortality Rate
    description: Age and sex-matched general-population mortality rate
    formula: look_up(life_table, sex = sex, age = age, bin = T, value = 'p_death')
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_death_ae
    display_name: Probability of fatal AE
    description: Probability of a fatal AE while on-treatment, per week
    formula: 1E-3
    strategy: chemo
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: p_death_ae
    display_name: Probability of fatal AE
    description: Probability of a fatal AE while on-treatment, per week
    formula: '5.0000000000000001E-4'
    strategy: target
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: p_death_ae
    display_name: Probability of fatal AE
    description: Probability of a fatal AE while on-treatment, per week
    formula: '5.9999999999999995E-4'
    strategy: check
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: cost_nausea
    display_name: Nausea, Cost per Event
    description: Nausea, Cost per Event
    formula: '1000'
    strategy: ~
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: p_relapse
    display_name: Probability of relapse
    description: Probability of experiencing a relapse, per week
    formula: 0.03/state_cycle
    strategy: chemo
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse
    display_name: Probability of relapse
    description: Probability of experiencing a relapse, per week
    formula: 0.025/state_cycle
    strategy: target
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse
    display_name: Probability of relapse
    description: Probability of experiencing a relapse, per week
    formula: 0.02/state_cycle
    strategy: check
    group: ~
    source: ~
    sampling: ~
  - name: p_disc
    display_name: Probability of discontinuation
    description: Probability of discontinuation of treatment, per week
    formula: ifelse(cycle == 12, 1, 0.01)
    strategy: chemo
    group: ~
    source: ~
    sampling: ~
  - name: p_disc
    display_name: Probability of discontinuation
    description: Probability of discontinuation of treatment, per week
    formula: ifelse(cycle == 16, 1, 0.005)
    strategy: target
    group: ~
    source: ~
    sampling: ~
  - name: p_disc
    display_name: Probability of discontinuation
    description: Probability of discontinuation of treatment, per week
    formula: ifelse(cycle == 24, 1, 0.008)
    strategy: check
    group: ~
    source: ~
    sampling: ~
  - name: p_death_response
    display_name: Probability of death in response
    description: Probability of death in response
    formula: p(to_death, tree = response_on_tx)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse_or_discontinue
    display_name: Probability of relapse or discontinuation
    description: Probability of relapse or discontinuation
    formula: p(to_relapse %or% to_off_tx, tree = response_on_tx)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_discontinue_given_survival
    display_name: Probability of discontinuation conditioned on surviving
    description: Probability of discontinuation conditioned on surviving
    formula: p(to_off_tx | survived, tree = response_on_tx)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse_alt
    display_name: dfdf
    description: dfdf
    formula: p_relapse * 0.7
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: eq5d_data
    display_name: EQ-5D data
    description: EQ-5D data
    formula: eq5d
    strategy: ~
    group: ~
    source: ~
    sampling: bootstrap(bc, id = "id", strata = "treatment")
  - name: eq5d_model
    display_name: EQ-5D linear model
    description: EQ-5D linear model
    formula: lm(value~treatment+state, data = eq5d_data)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
transitions:
  - from: relapse_free_on_tx
    to: relapse_free_on_tx
    formula: ifelse(state_cycle > 100, 0.2, 0.3)
  - from: relapse_free_on_tx
    to: relapse_free_off_tx
    formula: ifelse(state_cycle > 100, 0.2, 0.3)
  - from: relapse_free_on_tx
    to: relapse
    formula: ifelse(state_cycle > 100, 0.2, 0.3)
  - from: relapse_free_on_tx
    to: dead
    formula: C
  - from: relapse_free_off_tx
    to: relapse_free_off_tx
    formula: C
  - from: relapse_free_off_tx
    to: relapse
    formula: '0.03'
  - from: relapse_free_off_tx
    to: dead
    formula: '0.01'
  - from: relapse
    to: relapse
    formula: C
  - from: relapse
    to: dead
    formula: '0.04'
  - from: dead
    to: dead
    formula: '1'
values:
  - name: lys
    display_name: Life-Years
    description: Life Years
    state: relapse_free_on_tx
    destination: ~
    formula: cycle_length_years
    type: outcome
    discounting_override: ~
  - name: lys
    display_name: Life-Years
    description: Life Years
    state: relapse_free_off_tx
    destination: ~
    formula: cycle_length_years
    type: outcome
    discounting_override: ~
  - name: lys
    display_name: Life-Years
    description: Life Years
    state: relapse
    destination: ~
