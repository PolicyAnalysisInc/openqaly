format_version: '1.0'
model_type: markov
settings:
  timeframe: 4.0
  timeframe_unit: months
  cycle_length: 1.0
  cycle_length_unit: months
  discount_cost: 3.5
  discount_outcomes: 3.5
  half_cycle_method: life-table
  reduce_state_cycle: yes
  days_per_year: 365.25
  discount_timing: start
  discount_method: by_cycle
strategies:
  - name: chemo
    display_name: Chemotherapy
    description: Chemotherapy
    abbreviation: ~
    enabled: 1.0
  - name: check
    display_name: Checkimab
    description: Checkimab
    abbreviation: ~
    enabled: 1.0
groups:
  - name: male_age_lt_35
    display_name: Men Age 0-34
    description: Men under age 35
    weight: '0.24'
    enabled: 1.0
states:
  - name: state_1
    display_name: Relapse-Free (On-Tx)
    description: Relapse-free and on treatment
    initial_probability: '1'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 1.0
    state_cycle_limit_unit: Months
  - name: state_2
    display_name: Relapse-Free (Off-Tx)
    description: Relapse-free and off treatment
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 2.0
    state_cycle_limit_unit: Months
  - name: state_3
    display_name: Relapse
    description: Post-relapse
    initial_probability: '0'
    state_group: ~
    share_state_time: no
    state_cycle_limit: 1.0
    state_cycle_limit_unit: Months
variables:
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '26'
    strategy: ~
    group: male_age_lt_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '45'
    strategy: ~
    group: male_age_ge_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '27'
    strategy: ~
    group: female_age_lt_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: start_age
    display_name: Starting Age
    description: Age of patient at start of model
    formula: '48'
    strategy: ~
    group: female_age_ge_35
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"male"'
    strategy: ~
    group: male_age_lt_35
    source: ~
    sampling: ~
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"male"'
    strategy: ~
    group: male_age_ge_35
    source: ~
    sampling: ~
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"female"'
    strategy: ~
    group: female_age_lt_35
    source: ~
    sampling: ~
  - name: sex
    display_name: Sex
    description: Sex of patient
    formula: '"female"'
    strategy: ~
    group: female_age_ge_35
    source: ~
    sampling: ~
  - name: age
    display_name: Current age
    description: Current age in cycle
    formula: start_age + year
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_mort_gp
    display_name: GP Mortality Rate
    description: Age and sex-matched general-population mortality rate
    formula: look_up(life_table, sex = sex, age = age, bin = T, value = 'p_death')
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_death_ae
    display_name: Probability of fatal AE
    description: Probability of a fatal AE while on-treatment, per week
    formula: 1E-3
    strategy: chemo
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: p_death_ae
    display_name: Probability of fatal AE
    description: Probability of a fatal AE while on-treatment, per week
    formula: '5.0000000000000001E-4'
    strategy: target
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: p_death_ae
    display_name: Probability of fatal AE
    description: Probability of a fatal AE while on-treatment, per week
    formula: '5.9999999999999995E-4'
    strategy: check
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: cost_nausea
    display_name: Nausea, Cost per Event
    description: Nausea, Cost per Event
    formula: '1000'
    strategy: ~
    group: ~
    source: ~
    sampling: normal(bc, bc * 0.25)
  - name: p_relapse
    display_name: Probability of relapse
    description: Probability of experiencing a relapse, per week
    formula: 0.03/state_cycle
    strategy: chemo
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse
    display_name: Probability of relapse
    description: Probability of experiencing a relapse, per week
    formula: 0.025/state_cycle
    strategy: target
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse
    display_name: Probability of relapse
    description: Probability of experiencing a relapse, per week
    formula: 0.02/state_cycle
    strategy: check
    group: ~
    source: ~
    sampling: ~
  - name: p_disc
    display_name: Probability of discontinuation
    description: Probability of discontinuation of treatment, per week
    formula: ifelse(cycle == 12, 1, 0.01)
    strategy: chemo
    group: ~
    source: ~
    sampling: ~
  - name: p_disc
    display_name: Probability of discontinuation
    description: Probability of discontinuation of treatment, per week
    formula: ifelse(cycle == 16, 1, 0.005)
    strategy: target
    group: ~
    source: ~
    sampling: ~
  - name: p_disc
    display_name: Probability of discontinuation
    description: Probability of discontinuation of treatment, per week
    formula: ifelse(cycle == 24, 1, 0.008)
    strategy: check
    group: ~
    source: ~
    sampling: ~
  - name: p_death_response
    display_name: Probability of death in response
    description: Probability of death in response
    formula: p(to_death, tree = response_on_tx)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse_or_discontinue
    display_name: Probability of relapse or discontinuation
    description: Probability of relapse or discontinuation
    formula: p(to_relapse %or% to_off_tx, tree = response_on_tx)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_discontinue_given_survival
    display_name: Probability of discontinuation conditioned on surviving
    description: Probability of discontinuation conditioned on surviving
    formula: p(to_off_tx | survived, tree = response_on_tx)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: p_relapse_alt
    display_name: dfdf
    description: dfdf
    formula: p_relapse * 0.7
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: eq5d_data
    display_name: EQ-5D data
    description: EQ-5D data
    formula: eq5d
    strategy: ~
    group: ~
    source: ~
    sampling: bootstrap(bc, id = "id", strata = "treatment")
  - name: eq5d_model
    display_name: EQ-5D linear model
    description: EQ-5D linear model
    formula: lm(value~treatment+state, data = eq5d_data)
    strategy: ~
    group: ~
    source: ~
    sampling: ~
  - name: med_ucost
    display_name: Medication cost
    description: Medication cost
    formula: '1000'
    strategy: check
    group: ~
    source: ~
    sampling: ~
  - name: med_ucost
    display_name: Medication cost
    description: Medication cost
    formula: '124'
    strategy: chemo
    group: ~
    source: ~
    sampling: ~
transitions:
  - from: state_1
    to: state_2
    formula: '0.3'
  - from: state_1
    to: state_3
    formula: '0.2'
  - from: state_1
    to: state_1
    formula: C
  - from: state_2
    to: state_3
    formula: '0.35'
  - from: state_2
    to: state_2
    formula: C
  - from: state_3
    to: state_3
    formula: '1'
values:
  - name: state1_lys
    display_name: State 1 Life-Years
    description: State 1 Life-Years
    state: state_1
    destination: ~
    formula: cycle_length_years
    type: outcome
    discounting_override: ~
  - name: state2_lys
    display_name: State 2 Life-Years
    description: State 2 Life-Years
    state: state_2
    destination: ~
    formula: cycle_length_years
    type: outcome
    discounting_override: ~
  - name: state1_qalys
    display_name: State 1 QALYs
    description: State 1 QALYs
    state: state_1
    destination: ~
    formula: state1_lys * 0.8
    type: outcome
    discounting_override: ~
  - name: state2_qalys
    display_name: State 2 QALYs
    description: State 2 QALYs
    state: state_2
    destination: ~
    formula: state2_lys * 0.65
    type: outcome
    discounting_override: ~
  - name: term_cost
    display_name: Terminal care cost
    description: Cost of terminal care
    state: state_1
    destination: state_3
    formula: '4000'
    type: cost
    discounting_override: ~
  - name: term_cost
    display_name: Terminal care cost
    description: Cost of terminal care
    state: state_2
    destination: state_3
    formula: 3500 + state_day
    type: cost
    discounting_override: ~
  - name: screen_cost
    display_name: Sceening cost
    description: Cost of sceening
    state: ~
    destination: ~
    formula: '3500'
    type: cost
    discounting_override: ~
  - name: med_cost
    display_name: Medication cost
    description: Cost of medication
    state: state_1
    destination: ~
    formula: med_ucost * cycle_length_weeks
    type: cost
    discounting_override: ~
summaries:
  - name: lys
    display_name: Life-Years
    description: Life Years
    values: state1_lys, state2_lys
    type: outcome
    wtp: ~
  - name: qalys
    display_name: QALYs
    description: QALYs
    values: state1_qalys, state2_qalys
    type: outcome
    wtp: ~
  - name: total_cost
    display_name: Total Cost
    description: Total Cost
    values: term_cost, screen_cost, med_cost
    type: outcome
    wtp: ~
