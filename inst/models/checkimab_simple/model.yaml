trees:
  response_on_tx:
    - node: death_natural_causes
      formula: p_mort_gp
      tags: to_death
    - node: survive_natural_causes
      formula: C
      tags: survived
    - node: fatal_ae
      formula: p_death_ae
      parent: survive_natural_causes
      tags: to_death
    - node: no_fatal_ae
      formula: C
      parent: survive_natural_causes
      tags: survived
    - node: relapse
      formula: p_relapse
      parent: no_fatal_ae
      tags: to_relapse, survived
    - node: relapse_free
      formula: C
      parent: no_fatal_ae
      tags: survived
    - node: remain_on_tx
      formula: C
      parent: relapse_free
      tags: to_remain, survived
    - node: discontinue
      formula: p_disc
      parent: relapse_free
      tags: to_off_tx, survived

